name: Auto Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-release:
    name: Create Release from PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Determine version bump from PR title
        id: version_bump
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          if [[ "$PR_TITLE" =~ ^\[MAJOR\] ]] || [[ "$PR_TITLE" =~ ^\[major\] ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" =~ ^\[MINOR\] ]] || [[ "$PR_TITLE" =~ ^\[minor\] ]] || [[ "$PR_TITLE" =~ ^feat ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif [[ "$PR_TITLE" =~ ^\[PATCH\] ]] || [[ "$PR_TITLE" =~ ^\[patch\] ]] || [[ "$PR_TITLE" =~ ^fix ]] || [[ "$PR_TITLE" =~ ^refactor ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Check if release should be skipped
        id: skip_check
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          if [[ "$PR_TITLE" =~ ^\[SKIP\] ]] || \
             [[ "$PR_TITLE" =~ ^\[skip\] ]] || \
             [[ "$PR_TITLE" =~ ^docs: ]] || \
             [[ "$PR_TITLE" =~ ^chore: ]] || \
             [[ "$PR_TITLE" =~ ^test: ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          chmod +x .github/workflows/auto-release.sh
          .github/workflows/auto-release.sh ${{ steps.version_bump.outputs.bump }}

      - name: Push changes and tag
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git push origin main
          git push --tags

      - name: Get new version
        if: steps.skip_check.outputs.skip == 'false'
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.skip_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Changes

            Merged PR: #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}

            ## Install

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd astrometry-camera-orchestrator
            git checkout v${{ steps.version.outputs.VERSION }}
            make install
            ```

            ---
            🤖 Auto-released via GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: steps.skip_check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Release v${{ steps.version.outputs.VERSION }} created!**\n\n` +
                    `- Version bump: **${{ steps.version_bump.outputs.bump }}**\n` +
                    `- Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.VERSION }}`
            })

      - name: Comment on skipped release
        if: steps.skip_check.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏭️ **Release skipped** — docs/chore/test change only.`
            })
